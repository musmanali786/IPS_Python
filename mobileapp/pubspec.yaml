name: ips_collector
description: "IPS Research Platform field data collection app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Persistence & files
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  share_plus: ^10.0.2

  # Permissions
  permission_handler: ^11.3.1

  # Networking
  dio: ^5.7.0

  # Sensors (ACCE, GYRO, MAGN, PRES/barometer)
  sensors_plus: ^6.1.0
  # GNSS / GPS
  geolocator: ^13.0.1
  # WiFi scanning
  wifi_scan: ^0.4.1+2
  # BLE beacons
  flutter_blue_plus: ^1.32.12
  # Light sensor (Android)
  light: ^4.0.1
  # Proximity sensor
  proximity_sensor: ^1.3.7
  # Sound level (SOUN)
  noise_meter: ^5.0.2

  # Keep screen awake during continuous surveys
  wakelock_plus: ^1.2.8

  # Map ZIP import
  file_picker: ^8.1.2
  archive: ^3.6.1

  # Map designer: OSM tiles + geo registration
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.4.1

  # Live sensor charts
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# Launcher icon generation: place the 1024x1024 PNG at the path below, then run
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  # Android adaptive icon (API 26+): blue background + the icon art as foreground.
  adaptive_icon_background: "#1E40AF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 24

flutter:
  uses-material-design: true
